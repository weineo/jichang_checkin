name: "Common airport Checkin"

on:
  schedule:
    - cron: "40 22 * * *"  # 北京时间每天 06:00
  workflow_dispatch:

env:
  RUN_ENV: 'prod'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v3

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Random sleep
        if: github.event_name == 'schedule'
        run: sleep $(shuf -i 10-300 -n 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 安装基础依赖（忽略失败防止阻塞）
          pip install -r requirements.txt || echo "requirements.txt not found, skipping."
          # 强制安装 cloudscraper
          echo "📦 Installing cloudscraper..."
          pip install cloudscraper
          # 验证是否安装成功
          python -c "import cloudscraper; print('✅ cloudscraper 安装成功，版本:', cloudscraper.__version__)"

      - name: Run sign
        env:
          URL: ${{ secrets.URL }}
          SCKEY: ${{ secrets.SCKEY }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWD: ${{ secrets.PASSWD }}
          CONFIG: ${{ secrets.CONFIG }}
        run: python3 ./main.py
