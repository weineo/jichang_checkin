name: "Common airport Checkin"

on:
  schedule:
    - cron: "40 22 * * *"  # 北京时间每天 06:00
  workflow_dispatch:

env:
  RUN_ENV: 'prod'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v3

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Random sleep
        if: github.event_name == 'schedule'
        run: sleep $(shuf -i 10-300 -n 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || echo "requirements.txt 不存在，跳过"
          # 🌟 安装 curl_cffi（当前绕过 CF 最稳的 Python 库）
          pip install curl_cffi
          python -c "from curl_cffi import requests; print('✅ curl_cffi 安装成功')"

      - name: Run sign
        env:
          URL: ${{ secrets.URL }}
          SCKEY: ${{ secrets.SCKEY }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWD: ${{ secrets.PASSWD }}
          CONFIG: ${{ secrets.CONFIG }}
        run: python3 ./main.py
