name: "Common airport Checkin"

on:
  schedule:
    - cron: "40 22 * * *"  # 北京时间 06:00
  workflow_dispatch:

env:
  RUN_ENV: 'prod'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10.16

      - name: Random sleep  # 防封关键！保留
        if: github.event_name == 'schedule'
        run: sleep $(shuf -i 10-300 -n 1)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # 备用方案：用国内镜像 + 指定版本
          pip install --index-url https://pypi.tuna.tsinghua.edu.cn/simple cloudscraper==1.2.71

      - name: Run sign
        env:
          URL: ${{ secrets.URL }}
          SCKEY: ${{ secrets.SCKEY }}
          CONFIG: ${{ secrets.CONFIG }}  # ✅ 确保已配置此 Secret
          # 以下两个如不用可注释：
          # EMAIL: ${{ secrets.EMAIL }}
          # PASSWD: ${{ secrets.PASSWD }}
        run: |
          python3 ./main.py
