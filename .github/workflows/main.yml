name: "Common airport Checkin"

on:
  schedule:
    - cron: "40 22 * * *"  # 北京时间每天 06:00
  workflow_dispatch:

env:
  RUN_ENV: 'prod'

jobs:
  build:
    runs-on: ubuntu-24.04  # ✅ 明确指定 24.04，避免兼容性问题

    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Random sleep
        if: github.event_name == 'schedule'
        run: sleep $(shuf -i 10-300 -n 1)

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright requests
          # 安装 Chromium 浏览器内核
          python -m playwright install chromium
          # 🌟 关键：让 Playwright 自动安装系统依赖（自动适配 Ubuntu 24.04）
          python -m playwright install-deps chromium
          python -c "from playwright.sync_api import sync_playwright; print('✅ Playwright 就绪')"

      - name: Run sign
        env:
          URL: ${{ secrets.URL }}
          SCKEY: ${{ secrets.SCKEY }}
          EMAIL: ${{ secrets.EMAIL }}
          PASSWD: ${{ secrets.PASSWD }}
          CONFIG: ${{ secrets.CONFIG }}
        run: python3 ./main.py

      # 可选：失败时上传截图方便调试
      - name: Upload error screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: error_*.png
          retention-days: 3
          overwrite: true
